services:
  postgres:
    volumes:
      - ../.test-runtime/postgres:/var/lib/postgresql/data
      - ../backend/migrations:/docker-entrypoint-initdb.d:ro
  audio-init:
    volumes:
      - ../.test-runtime/audio:/var/lib/call-recorder/audio
  backend:
    ports:
      - "18080:8080"
    volumes:
      - ../.test-runtime/audio:/var/lib/call-recorder/audio
