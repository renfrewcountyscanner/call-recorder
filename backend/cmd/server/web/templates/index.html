{{define "index.html"}}<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{.Title}}</title><script src="https://unpkg.com/htmx.org@2.0.4"></script><style>body{font-family:system-ui;margin:2rem;max-width:1200px}table{border-collapse:collapse;width:100%}th,td{padding:.5rem;border-bottom:1px solid #ddd;text-align:left}audio{width:220px}input{padding:.5rem;width:min(14rem,100%)}</style></head><body><h1>Call Recorder</h1><form hx-get="/calls" hx-target="#calls" hx-trigger="submit, keyup changed delay:350ms from:input"><label>Search <input name="q" autocomplete="off"></label><label>Sender <input name="sender"></label><label>System <input name="system"></label><label>Talkgroup <input name="talkgroup"></label><label>Radio <input name="radio"></label><label>Date <input type="date" name="date"></label></form><section id="calls" hx-get="/calls" hx-trigger="load"></section></body></html>{{end}}
