{{define "calls.html"}}<table><thead><tr><th>Time</th><th>System</th><th>Talkgroup</th><th>Radio</th><th>Duration</th><th>Audio</th></tr></thead><tbody>{{range .Calls}}<tr><td><a href="/call/{{.ID}}">{{.StartTime.Local.Format "2006-01-02 15:04:05"}}</a></td><td>{{.SystemID}} {{.SystemName}}</td><td>{{.TalkgroupID}} {{.TalkgroupName}}</td><td>{{.RadioID}} {{.RadioName}}</td><td>{{.DurationMS}} ms</td><td><audio controls preload="none" src="/media/{{.ID}}"></audio></td></tr>{{else}}<tr><td colspan="6">No completed calls found.</td></tr>{{end}}</tbody></table><script>document.querySelectorAll('audio').forEach((a,i,all)=>a.onended=()=>{if(i+1<all.length)all[i+1].play()})</script>{{end}}
